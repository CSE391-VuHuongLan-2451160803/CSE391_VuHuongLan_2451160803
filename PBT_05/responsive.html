<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Responsive Product Page</title>

    <link rel="stylesheet" href="responsive.css">
</head>

<body>

    <!-- HEADER -->
    <header class="header">

        <h1 class="logo">ShopTLU</h1>

        <!-- Hamburger mobile -->
        <button class="hamburger">
            ☰
        </button>

        <!-- Navigation -->
        <nav class="nav">
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>

    </header>

    <!-- LAYOUT -->
    <div class="layout">

        <!-- SIDEBAR -->
        <aside class="sidebar">

            <h2>Bộ lọc</h2>

            <label>
                <input type="checkbox">
                Apple
            </label>

            <label>
                <input type="checkbox">
                Samsung
            </label>

            <label>
                <input type="checkbox">
                Xiaomi
            </label>

        </aside>

        <!-- MAIN CONTENT -->
        <main class="products">

            <!-- CARD 1 -->
            <article class="card">
                <img src="https://placehold.co/300x200"
                     alt="iPhone 16">

                <h3>iPhone 16</h3>

                <p>25.990.000đ</p>

                <button>Mua ngay</button>
            </article>

            <!-- CARD 2 -->
            <article class="card">
                <img src="https://placehold.co/300x200"
                     alt="MacBook">

                <h3>MacBook Pro</h3>

                <p>45.990.000đ</p>

                <button>Mua ngay</button>
            </article>

            <!-- CARD 3 -->
            <article class="card">
                <img src="https://placehold.co/300x200"
                     alt="iPad">

                <h3>iPad Air</h3>

                <p>18.990.000đ</p>

                <button>Mua ngay</button>
            </article>

            <!-- CARD 4 -->
            <article class="card">
                <img src="https://placehold.co/300x200"
                     alt="Samsung">

                <h3>Samsung S25</h3>

                <p>23.990.000đ</p>

                <button>Mua ngay</button>
            </article>

            <!-- CARD 5 -->
            <article class="card">
                <img src="https://placehold.co/300x200"
                     alt="Dell">

                <h3>Dell XPS</h3>

                <p>35.990.000đ</p>

                <button>Mua ngay</button>
            </article>

            <!-- CARD 6 -->
            <article class="card">
                <img src="https://placehold.co/300x200"
                     alt="Asus">

                <h3>Asus ROG</h3>

                <p>39.990.000đ</p>

                <button>Mua ngay</button>
            </article>

            <!-- CARD 7 -->
            <article class="card">
                <img src="https://placehold.co/300x200"
                     alt="AirPods">

                <h3>AirPods Pro</h3>

                <p>6.990.000đ</p>

                <button>Mua ngay</button>
            </article>

            <!-- CARD 8 -->
            <article class="card">
                <img src="https://placehold.co/300x200"
                     alt="Apple Watch">

                <h3>Apple Watch</h3>

                <p>9.990.000đ</p>

                <button>Mua ngay</button>
            </article>

        </main>

        <!-- ADS -->
        <aside class="ads">
            <img src="https://placehold.co/200x600"
                 alt="Quảng cáo">
        </aside>

    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <p>Copyright © 2026 ShopTLU</p>
    </footer>

</body>
</html>
