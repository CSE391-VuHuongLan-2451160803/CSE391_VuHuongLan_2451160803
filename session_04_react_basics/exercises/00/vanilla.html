<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Todo — Vanilla JS</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 2rem auto;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            border-bottom: 1px solid #eee;
        }

        .todo-item.done span {
            text-decoration: line-through;
            color: #999;
        }

        .todo-item button {
            margin-left: auto;
            background: #e74c3c;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
        }

        input[type="text"] {
            padding: 8px;
            width: 70%;
        }

        button.add-btn {
            padding: 8px 16px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>📋 Todo List</h1>

    <div>
        <input type="text" id="todoInput" placeholder="Nhập công việc...">
        <button class="add-btn" onclick="addTodo()">Thêm</button>
    </div>

    <div id="todoList"></div>

    <script>
        let todos = [];

        // Render danh sách todo
        function renderTodos() {
            // TODO 1
            const list = document.getElementById('todoList');

            // TODO 2 + TODO 3 + TODO 4
            list.innerHTML = todos.map(todo => `
                <div class="todo-item ${todo.done ? 'done' : ''}">
                    <input 
                        type="checkbox"
                        ${todo.done ? 'checked' : ''}
                        onchange="toggleTodo(${todo.id})"
                    >

                    <span>${todo.text}</span>

                    <button onclick="deleteTodo(${todo.id})">
                        Xóa
                    </button>
                </div>
            `).join('');
        }

        // Thêm todo
        function addTodo() {
            // TODO 5
            const input = document.getElementById('todoInput');
            const text = input.value.trim();

            if (!text) return;

            // TODO 6
            const newTodo = {
                id: Date.now(),
                text: text,
                done: false
            };

            // TODO 7
            todos.push(newTodo);

            // TODO 8
            renderTodos();

            // TODO 9
            input.value = '';
        }

        // Toggle done
        function toggleTodo(id) {
            // TODO 10
            todos = todos.map(todo => {
                if (todo.id === id) {
                    return {
                        ...todo,
                        done: !todo.done
                    };
                }

                return todo;
            });

            // TODO 11
            renderTodos();
        }

        // Xóa todo
        function deleteTodo(id) {
            // TODO 12
            todos = todos.filter(todo => todo.id !== id);

            // TODO 13
            renderTodos();
        }
    </script>
</body>
</html>
