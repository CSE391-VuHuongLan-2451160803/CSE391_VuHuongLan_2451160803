<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Quản lý công việc</title>

  <link rel="stylesheet" href="b2.css">
</head>

<body>

<div class="container">

  <h1>QUẢN LÝ CÔNG VIỆC CÁ NHÂN</h1>

  <!-- Top Bar -->
  <div class="top-bar">

    <button class="btn btn-add" id="openModalBtn">
      + Thêm công việc
    </button>

  </div>

  <!-- Statistics -->
  <div class="statistics">

    <div class="stat-box">
      <h3>Tổng công việc</h3>
      <p id="totalTasks">0</p>
    </div>

    <div class="stat-box">
      <h3>Đã hoàn thành</h3>
      <p id="completedTasks">0</p>
    </div>

    <div class="stat-box">
      <h3>Chưa hoàn thành</h3>
      <p id="pendingTasks">0</p>
    </div>

  </div>

  <!-- Message -->
  <div class="message" id="messageBox"></div>

  <!-- Task List -->
  <div class="task-list" id="taskList">

  </div>

</div>

<!-- Modal -->
<div class="modal" id="taskModal">

  <div class="modal-content">

    <span class="close" id="closeModal">&times;</span>

    <h2 id="modalTitle">Thêm công việc</h2>

    <form id="taskForm">

      <div class="form-group">
        <label>Tiêu đề công việc</label>
        <input type="text" id="taskTitle" required>
      </div>

      <div class="form-group">
        <label>Mô tả ngắn</label>
        <textarea id="taskDescription" required></textarea>
      </div>

      <div class="form-group">
        <label>Hạn hoàn thành</label>
        <input type="date" id="taskDeadline" required>
      </div>

      <div class="form-group">
        <label>Mức ưu tiên</label>

        <select id="taskPriority">

          <option value="Cao">Cao</option>
          <option value="Trung bình">Trung bình</option>
          <option value="Thấp">Thấp</option>

        </select>
      </div>

      <div class="form-actions">

        <button type="button" class="btn btn-cancel" id="cancelBtn">
          Hủy
        </button>

        <button type="submit" class="btn btn-save" id="submitBtn">
          Lưu công việc
        </button>

      </div>

    </form>

  </div>

</div>

<script src="b2.js"></script>

</body>
</html>
