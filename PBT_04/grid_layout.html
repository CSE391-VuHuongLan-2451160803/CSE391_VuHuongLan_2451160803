<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Layout</title>

    <link rel="stylesheet" href="grid.css">
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <header class="header">
        <h1>ShopTLU</h1>
    </header>

    <!-- HERO -->
    <section class="hero">
        <div class="hero-card">
            <h2>Sản phẩm nổi bật</h2>
        </div>

        <div class="hero-card">
            <h2>Sale 50%</h2>
        </div>

        <div class="hero-card">
            <h2>Flash Sale</h2>
        </div>
    </section>

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <h2>Bộ lọc</h2>

        <label>
            <input type="checkbox">
            Apple
        </label>

        <label>
            <input type="checkbox">
            Samsung
        </label>

        <label>
            <input type="checkbox">
            Xiaomi
        </label>

    </aside>

    <!-- MAIN -->
    <main class="main-content">

        <article class="product">
            <img src="https://placehold.co/300x200" alt="iPhone">
            <h3>iPhone 16</h3>
        </article>

        <article class="product">
            <img src="https://placehold.co/300x200" alt="MacBook">
            <h3>MacBook</h3>
        </article>

        <article class="product">
            <img src="https://placehold.co/300x200" alt="iPad">
            <h3>iPad</h3>
        </article>

        <article class="product">
            <img src="https://placehold.co/300x200" alt="Asus">
            <h3>Asus</h3>
        </article>

        <article class="product">
            <img src="https://placehold.co/300x200" alt="Dell">
            <h3>Dell</h3>
        </article>

        <article class="product">
            <img src="https://placehold.co/300x200" alt="Samsung">
            <h3>Samsung</h3>
        </article>

    </main>

    <!-- ADS -->
    <aside class="ads">
        <img src="https://placehold.co/200x600"
             alt="Ads">
    </aside>

    <!-- FOOTER -->
    <footer class="footer">
        Copyright 2026
    </footer>

</div>

</body>
</html>
