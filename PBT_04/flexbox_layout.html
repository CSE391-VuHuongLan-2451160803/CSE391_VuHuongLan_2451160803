<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Layout</title>

    <link rel="stylesheet" href="flexbox.css">
</head>

<body>

    <!-- NAVBAR -->
    <header class="navbar">

        <div class="logo">
            ShopTLU
        </div>

        <nav class="menu">
            <a href="#">Home</a>

        </nav>

        <div class="auth">
            <a href="#">Login</a>
            <a href="#">Register</a>
        </div>

    </header>

    <!-- PRODUCT GRID -->
    <main class="products">

        <!-- CARD 1 -->
        <article class="card">
            <img src="https://placehold.co/300x200" alt="iPhone">
            <h3>iPhone 16</h3>
            <p>25.990.000đ</p>
            <button>Mua</button>
        </article>

        <!-- CARD 2 -->
        <article class="card">
            <img src="https://placehold.co/300x200" alt="MacBook">
            <h3>MacBook Pro</h3>
            <p>45.990.000đ</p>
            <button>Mua</button>
        </article>

        <!-- CARD 3 -->
        <article class="card">
            <img src="https://placehold.co/300x200" alt="iPad">
            <h3>iPad Air</h3>
            <p>18.990.000đ</p>
            <button>Mua</button>
        </article>

        <!-- CARD 4 -->
        <article class="card">
            <img src="https://placehold.co/300x200" alt="Apple Watch">
            <h3>Apple Watch</h3>
            <p>9.990.000đ</p>
            <button>Mua</button>
        </article>

        <!-- CARD 5 -->
        <article class="card">
            <img src="https://placehold.co/300x200" alt="Samsung">
            <h3>Samsung S25</h3>
            <p>23.990.000đ</p>
            <button>Mua</button>
        </article>

        <!-- CARD 6 -->
        <article class="card">
            <img src="https://placehold.co/300x200" alt="Laptop">
            <h3>Dell XPS</h3>
            <p>35.990.000đ</p>
            <button>Mua</button>
        </article>

        <!-- CARD 7 -->
        <article class="card">
            <img src="https://placehold.co/300x200" alt="Asus">
            <h3>Asus ROG</h3>
            <p>39.990.000đ</p>
            <button>Mua</button>
        </article>

        <!-- CARD 8 -->
        <article class="card">
            <img src="https://placehold.co/300x200" alt="Tai nghe">
            <h3>AirPods Pro</h3>
            <p>6.990.000đ</p>
            <button>Mua</button>
        </article>

    </main>

</body>
</html>
