<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimedia - Sản phẩm</title>
</head>

<body>

<h1>Giới thiệu sản phẩm</h1>

<!-- 1. Ảnh sản phẩm -->
<section>
    <h2>Hình ảnh sản phẩm</h2>

    <figure>
        <img src="https://placehold.co/300x200"
             alt="iPhone 16 Pro mặt trước"
             loading="lazy"
             style="max-width:100%; height:auto;">
        <figcaption>iPhone 16 Pro - Mặt trước</figcaption>
    </figure>

    <figure>
        <img src="https://placehold.co/300x200"
             alt="iPhone 16 Pro mặt sau"
             loading="lazy"
             style="max-width:100%; height:auto;">
        <figcaption>iPhone 16 Pro - Mặt sau</figcaption>
    </figure>

    <figure>
        <img src="https://placehold.co/300x200"
             alt="iPhone 16 Pro góc nghiêng"
             loading="lazy"
             style="max-width:100%; height:auto;">
        <figcaption>iPhone 16 Pro - Góc nghiêng</figcaption>
    </figure>

</section>

<!-- 2. Video YouTube -->
<section>
    <h2>Video giới thiệu (YouTube)</h2>

    <iframe width="560" height="315"
        src="https://www.youtube.com/embed/dQw4w9WgXcQ"
        title="Video giới thiệu sản phẩm"
        frameborder="0"
        allowfullscreen>
    </iframe>
</section>

<!-- 3. Video HTML5 -->
<section>
    <h2>Video sản phẩm (HTML5)</h2>

    <video controls poster="https://placehold.co/300x200" style="max-width:100%;">
        <source src="video.mp4" type="video/mp4">
        <source src="video.webm" type="video/webm">
        Trình duyệt không hỗ trợ video.
    </video>
</section>

<!-- 4. Audio -->
<section>
    <h2>Nhạc nền</h2>

    <audio controls>
        <source src="audio.mp3" type="audio/mpeg">
        Trình duyệt không hỗ trợ audio.
    </audio>
</section>

<!-- 5. SVG -->
<section>
    <h2>Logo (SVG)</h2>

    <svg width="100" height="100">
        <circle cx="50" cy="50" r="40" stroke="black" stroke-width="2" fill="blue" />
    </svg>

</section>

</body>
</html>
