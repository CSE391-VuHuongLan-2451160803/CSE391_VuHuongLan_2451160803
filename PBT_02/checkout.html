<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán</title>
</head>

<body>

<h1>Trang đặt hàng</h1>

<!-- PHẦN 1: GIỎ HÀNG -->
<section>
    <h2>Giỏ hàng</h2>

    <table border="1">
        <thead>
            <tr>
                <th>STT</th>
                <th>Sản phẩm</th>
                <th>Đơn giá</th>
                <th>Số lượng</th>
                <th>Thành tiền</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>1</td>
                <td>iPhone 16 Pro</td>
                <td>25.000.000đ</td>
                <td>1</td>
                <td>25.000.000đ</td>
            </tr>

            <tr>
                <td>2</td>
                <td>AirPods Pro</td>
                <td>5.000.000đ</td>
                <td>2</td>
                <td>10.000.000đ</td>
            </tr>

            <tr>
                <td>3</td>
                <td>Sạc nhanh</td>
                <td>500.000đ</td>
                <td>1</td>
                <td>500.000đ</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <td colspan="4"><strong>Tổng cộng</strong></td>
                <td><strong>35.500.000đ</strong></td>
            </tr>
        </tfoot>
    </table>
</section>

<br>

<!-- PHẦN 2: FORM THANH TOÁN -->
<section>
    <h2>Thanh toán</h2>

    <form action="#" method="POST">

        <fieldset>
            <legend>Phương thức thanh toán</legend>

            <input type="radio" id="cod" name="payment" value="cod">
            <label for="cod">COD</label>

            <input type="radio" id="bank" name="payment" value="bank">
            <label for="bank">Chuyển khoản</label>

            <input type="radio" id="wallet" name="payment" value="wallet">
            <label for="wallet">Ví điện tử</label>
        </fieldset>

        <br>

        <label for="coupon">Mã giảm giá:</label><br>
        <input type="text" id="coupon" name="coupon"
               placeholder="SALE2026"
               pattern="SALE[0-9]{4}">
        <br><br>

        <label for="note">Ghi chú:</label><br>
        <textarea id="note" name="note" rows="3"
                  placeholder="Nhập ghi chú (nếu có)"></textarea>

        <br><br>

        <!-- PHẦN 3: GIAO HÀNG -->
        <fieldset>
            <legend>Thông tin giao hàng</legend>

            <label for="delivery-date">Ngày giao hàng:</label><br>
            <input type="date" id="delivery-date" name="delivery-date"
                   min="2026-01-02">
            <br><br>

            <label for="time-slot">Khung giờ:</label><br>
            <select id="time-slot" name="time-slot">
                <option>Sáng (8-12h)</option>
                <option>Chiều (14-18h)</option>
                <option>Tối (18-21h)</option>
            </select>

            <br><br>

            <label for="days">Thời gian giao (ngày):</label><br>
            <input type="range" id="days" name="days"
                   min="1" max="7" step="1">
        </fieldset>

        <br>

        <button type="submit" aria-label="Xác nhận đặt hàng">
            Đặt hàng
        </button>

    </form>
</section>

</body>
</html>
