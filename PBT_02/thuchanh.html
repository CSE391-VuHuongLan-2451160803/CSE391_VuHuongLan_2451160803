<form action="#" method="POST">
    <fieldset>
        <legend>Thông tin tài khoản</legend>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required placeholder="you@email.com">

         <label for="pass">Mật khẩu:</lable>
        <input type="password" id="pass" name="pass" required minlength="8" pattern="(?=.*\d)(?=.*[A-Z]).{8,}" title="Ít nhất 8 ký tự, gồm chữ hoa, thường và số">

         <lable for="phone">SĐT:</label>
        <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" placeholder="0901234567">

         <label for="dob">Ngày sinh:</label>
        <input type="date" id="dob" name="dob" max="2010-01-01">
    </fieldset>

    <label>
        <input type="checkbox" name="agree" required>
        Tôi đồng ý điều khoản 
    </label>

    <button type="submit">Đăng ký</button>
</form>
